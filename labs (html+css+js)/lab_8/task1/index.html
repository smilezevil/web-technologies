<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Pair Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="setup-screen" id="setup-screen">
    <div class="setup-box">
        <h1 class="setup-title">Memory Game</h1>

        <div class="setup-section">
            <label class="setup-label">Гравці</label>
            <div class="btn-group">
                <button class="btn-option active" data-group="players" data-value="1">1 гравець</button>
                <button class="btn-option"        data-group="players" data-value="2">2 гравці</button>
            </div>
        </div>

        <div class="setup-section" id="player-names">
            <div class="name-row">
                <label>Гравець 1:</label>
                <input type="text" id="name-p1" class="name-input" placeholder="Введіть ім'я" maxlength="20" />
            </div>
            <div class="name-row" id="name-p2-row" style="display:none">
                <label>Гравець 2:</label>
                <input type="text" id="name-p2" class="name-input" placeholder="Введіть ім'я" maxlength="20" />
            </div>
        </div>

        <div class="setup-section">
            <label class="setup-label">Розмір поля</label>
            <div class="btn-group">
                <button class="btn-option active" data-group="size" data-value="4x4">4×4</button>
                <button class="btn-option"        data-group="size" data-value="4x5">4×5</button>
                <button class="btn-option"        data-group="size" data-value="4x6">4×6</button>
                <button class="btn-option"        data-group="size" data-value="5x6">5×6</button>
                <button class="btn-option"        data-group="size" data-value="6x6">6×6</button>
            </div>
        </div>

        <div class="setup-section">
            <label class="setup-label">Складність</label>
            <div class="btn-group">
                <button class="btn-option active" data-group="diff" data-value="easy">Easy (3 хв)</button>
                <button class="btn-option"        data-group="diff" data-value="normal">Normal (2 хв)</button>
                <button class="btn-option"        data-group="diff" data-value="hard">Hard (1 хв)</button>
            </div>
        </div>

        <div class="setup-section">
            <label class="setup-label">Раундів</label>
            <div class="rounds-control">
                <button class="rounds-btn" id="rounds-minus">−</button>
                <span id="rounds-display">1</span>
                <button class="rounds-btn" id="rounds-plus">+</button>
            </div>
        </div>

        <div class="setup-actions">
            <button class="btn-secondary" id="btn-reset-settings">Скинути налаштування</button>
            <button class="btn-primary"   id="btn-start-game">Розпочати гру</button>
        </div>
    </div>
</div>

<div class="game-screen" id="game-screen" style="display:none">

    <div class="hud" id="hud">
        <div class="hud-left">
            <div class="current-player" id="current-player-display" style="display:none">
                Хід: <span id="current-player-name">Гравець 1</span>
            </div>
            <div class="scores" id="scores-display">
                <div class="score-card" id="score-p1">
                    <span class="score-name" id="hud-name-p1">Гравець 1</span>
                    <span class="score-val"  id="hud-score-p1">0</span>
                </div>
                <div class="score-card" id="score-p2" style="display:none">
                    <span class="score-name" id="hud-name-p2">Гравець 2</span>
                    <span class="score-val"  id="hud-score-p2">0</span>
                </div>
            </div>
        </div>

        <div class="hud-center">
            <div class="timer" id="timer-display">03:00</div>
            <div class="round-info" id="round-info">Раунд 1 / 1</div>
        </div>

        <div class="hud-right">
            <div class="moves-display">
                Ходів: <span id="moves-count">0</span>
            </div>
            <button class="btn-restart" id="btn-restart">Рестарт</button>
            <button class="btn-secondary btn-sm" id="btn-to-settings">Налаштування</button>
        </div>
    </div>

    <div class="board-wrapper">
        <div class="board" id="board"></div>
    </div>
</div>

<div class="modal-overlay" id="modal" style="display:none">
    <div class="modal-box">
        <h2 class="modal-title" id="modal-title">Раунд завершено!</h2>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions">
            <button class="btn-primary" id="modal-next">Наступний раунд</button>
            <button class="btn-secondary" id="modal-settings">До налаштувань</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
