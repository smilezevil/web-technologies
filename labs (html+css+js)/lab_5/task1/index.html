<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>task1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Завдання 1 – Лампочка</h2>

<div id="bulb-container">
    <img class="default-off active" src="./imgs/off.png"      width="150">
    <img class="default-on"         src="./imgs/on.png"       width="150">
    <img class="energy-saving-off"  src="./imgs/off energy.png"   width="150">
    <img class="energy-saving-on"   src="./imgs/on energy.png"    width="150">
    <img class="led-off"            src="./imgs/off diod.png"  width="150">
    <img class="led-on"             src="./imgs/on diod.png"   width="150">
</div>

<br>

<p class="status-info">Лампочка: ВИМКНЕНА (Звичайна)</p>
<p class="brightness-info"></p>
<p class="timer-info"></p>

<br>

<button class="default-button">Звичайна</button>
<button class="energy-saving-button">Енергозберігаюча</button>
<button class="led-button">Світлодіодна</button>

<br><br>

<button class="on-button">Увімкнути</button>
<button class="off-button">Вимкнути</button>
<button class="brightness-button">Змінити яскравість</button>

<script src="script.js"></script>
</body>
</html>
