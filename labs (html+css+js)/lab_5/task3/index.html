<h2>Цифровий годинник</h2>
<div class="clock">
    <p id="hour">00:</p>
    <p id="minute">00:</p>
    <p id="second">00</p>
</div>
<h2>Таймер</h2>

        <p id="timer-minute">00:</p>
        <p id="timer-second">00</p>

    </div>
</div>
